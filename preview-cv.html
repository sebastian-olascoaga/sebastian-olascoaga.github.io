<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CV — Sebastian Olascoaga</title>
<meta name="description" content="Curriculum vitae of Sebastian Olascoaga." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F2EC;
    --paper-tint:#EBE8E0;
    --paper-deep:#DDD8CB;
    --ink:#2A1E15;
    --text:#403228;
    --muted:#6A553E;
    --hint:#A89A82;
    --hair:rgba(42,30,21,0.12);
    --rule:rgba(42,30,21,0.22);
    --counter:#A89A82;
    --accent:#6B1F2D;
    --accent-soft:rgba(107,31,45,0.14);--treat:#1F4F5A;--treat-soft:rgba(31,79,90,0.14);
    --serif:"Source Serif 4",Georgia,serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#1A1410;
      --paper-tint:#251D17;
      --paper-deep:#33281F;
      --ink:#F5EFE4;
      --text:#DDD2BF;
      --muted:#9C8A72;
      --hint:#6F6051;
      --hair:rgba(245,239,228,0.10);
      --rule:rgba(245,239,228,0.20);
      --counter:#6F6051;
      --accent:#C9685A;
      --accent-soft:rgba(201,104,90,0.18);--treat:#7AB8C2;--treat-soft:rgba(122,184,194,0.20);
    }
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; background:var(--paper); color:var(--text);
    font-family:var(--sans); font-size:16px; line-height:1.55;
    font-weight:400; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  .num{font-variant-numeric:tabular-nums;}

  .wrap{max-width:1200px; margin:0 auto; padding:0 40px;}

  /* HEADER */
  header.site{
    padding:56px 0 32px;
    border-bottom:1px solid var(--hair);
  }
  .head-grid{
    display:grid; grid-template-columns:auto 1fr; gap:48px;
    align-items:start;
  }
  .name-block{min-width:0;}
  .name{
    font-family:var(--serif); font-weight:500; color:var(--ink);
    font-size:clamp(28px,3.6vw,34px); line-height:1.06;
    font-variation-settings:"opsz" 96;
    letter-spacing:-0.005em; margin:0 0 8px;
  }
  .name a{text-decoration:none;}
  .role{
    font-family:var(--sans); font-size:13px; color:var(--muted);
    letter-spacing:0.04em; margin:0;
  }
  .role .dot{color:var(--hint); margin:0 6px;}
  .role strong{color:var(--ink); font-weight:500;}

  .nav{
    margin-top:20px;
    display:flex; flex-wrap:wrap; gap:8px 26px;
    font-family:var(--sans); font-size:13.5px; color:var(--muted);
    grid-column:1 / -1;
  }
  .nav a{
    text-decoration:none; padding-bottom:3px;
    border-bottom:1px solid transparent;
    transition:color .15s ease, border-color .15s ease;
  }
  .nav a:hover, .nav a.here{color:var(--ink); border-bottom-color:var(--accent);}

  /* HERO (spans full width of container) */
  .hero{
    padding:64px 0 56px;
    border-bottom:1px solid var(--hair);
  }
  .hero p{
    font-family:var(--serif);
    font-size:clamp(28px,3.8vw,42px); line-height:1.18;
    font-variation-settings:"opsz" 96;
    font-weight:400; color:var(--ink);
    letter-spacing:-0.012em; margin:0; max-width:50ch;
  }
  .hero p em{
    font-style:italic; color:var(--accent);
    font-variation-settings:"opsz" 96;
  }
  .hero-cta{
    display:inline-block; margin-top:28px;
    font-family:var(--sans); font-size:14px; font-weight:500;
    color:var(--accent); text-decoration:none;
    letter-spacing:0.04em;
    border-bottom:1px solid var(--accent); padding-bottom:2px;
    transition:color .15s ease, border-color .15s ease;
  }
  .hero-cta:hover{ color:var(--ink); border-bottom-color:var(--ink); }

  /* TWO-COLUMN BODY */
  .landing-body{
    display:grid; grid-template-columns:1fr 340px;
    gap:80px; align-items:start;
    padding:56px 0 0;
  }
  .landing-main{min-width:0; max-width:680px;}
  .landing-side{min-width:0;}

  /* ABOUT */
  .about{
    margin:0;
  }
  .about-label{
    font-family:var(--sans); font-size:11.5px; font-weight:600;
    letter-spacing:0.2em; text-transform:uppercase;
    color:var(--muted); margin:0 0 18px;
  }
  .about p{
    font-size:17px; line-height:1.65; color:var(--text);
    max-width:none; margin:0 0 18px;
  }
  .about p:last-child{margin-bottom:0;}
  .about strong{color:var(--ink); font-weight:500;}
  .about em{font-style:italic; color:var(--ink);}

  /* RIGHT NOW */
  .now{
    margin:48px 0 0;
    padding:28px 32px;
    background:var(--paper-tint);
    border-left:3px solid var(--accent);
    border-radius:0 2px 2px 0;
  }
  .now-head{
    display:flex; align-items:baseline; justify-content:space-between;
    gap:18px; margin:0 0 14px;
  }
  .now-label{
    font-family:var(--sans); font-size:11.5px; font-weight:600;
    letter-spacing:0.2em; text-transform:uppercase;
    color:var(--accent); margin:0;
  }
  .now-when{
    font-family:var(--sans); font-size:11.5px; color:var(--muted);
    letter-spacing:0.04em; font-style:italic;
  }
  .now p{
    font-family:var(--serif);
    font-size:17px; line-height:1.55; color:var(--text);
    font-variation-settings:"opsz" 16;
    max-width:58ch; margin:0;
  }
  .now p em{font-style:italic; color:var(--ink);}

  /* THREADS (right column) */
  .threads{margin:0;}
  .threads-head{
    display:flex; align-items:baseline; gap:18px;
    padding-bottom:14px; margin:0 0 8px;
    border-bottom:1px solid var(--ink);
  }
  .threads-label{
    font-family:var(--sans); font-size:12px; font-weight:600;
    letter-spacing:0.22em; text-transform:uppercase; color:var(--ink);
  }
  .thread-card{
    display:block; padding:22px 0; border-bottom:1px solid var(--hair);
    text-decoration:none; color:inherit;
  }
  .thread-card:last-child{border-bottom:none;}
  .thread-card:hover .thread-title{color:var(--accent);}
  .thread-eye{
    font-family:var(--sans); font-size:10.5px; font-weight:600;
    letter-spacing:0.18em; text-transform:uppercase;
    color:var(--muted); margin:0 0 8px;
  }
  .thread-title{
    font-family:var(--serif); font-weight:500; color:var(--ink);
    font-size:20px; line-height:1.22;
    font-variation-settings:"opsz" 36;
    letter-spacing:-0.005em;
    margin:0 0 8px;
    transition:color .15s ease;
  }
  .thread-title em{font-style:italic;}
  .thread-note{
    font-family:var(--sans); font-size:13px; color:var(--text);
    line-height:1.55; margin:0;
  }

  /* footer */
  footer{margin-top:96px; padding:48px 0 96px; border-top:1px solid var(--hair);}
  .foot-grid{display:flex; justify-content:space-between; flex-wrap:wrap; gap:30px; align-items:flex-end;}
  .foot-note{
    font-family:var(--serif); font-size:14px; color:var(--muted);
    max-width:48ch; line-height:1.55; font-style:italic;
    font-variation-settings:"opsz" 16;
  }
  .footlinks{display:flex; flex-wrap:wrap; gap:6px 22px; font-family:var(--sans); font-size:13px; color:var(--muted);}
  .footlinks a{text-decoration:none; border-bottom:1px solid transparent; transition:border-color .15s ease,color .15s ease;}
  .footlinks a:hover{color:var(--ink); border-bottom-color:var(--accent);}
  .copy{font-family:var(--sans); font-size:11.5px; color:var(--hint); letter-spacing:0.06em; margin:0;}

  .reveal{opacity:0; transform:translateY(8px); animation:rise .6s cubic-bezier(.2,.7,.2,1) forwards;}
  @keyframes rise{to{opacity:1; transform:none;}}
  .d1{animation-delay:.04s}.d2{animation-delay:.14s}.d3{animation-delay:.24s}.d4{animation-delay:.34s}.d5{animation-delay:.44s}
  @media (prefers-reduced-motion: reduce){.reveal{opacity:1; transform:none; animation:none;}}

  @media (max-width:900px){
    .landing-body{grid-template-columns:1fr; gap:64px;}
    .landing-side{order:2;}
  }
  @media (max-width:640px){
    .wrap{padding:0 22px;}
    header.site{padding-top:40px;}
    .head-grid{grid-template-columns:1fr; gap:18px;}
    .hero{padding:48px 0 40px;}
    .landing-body{padding-top:40px; gap:48px;}
    .now{padding:22px 22px;}
    .upd{grid-template-columns:1fr; gap:6px;}
    .upd-date{text-align:left;}
    .upd-day, .upd-year{display:inline; font-size:12px; color:var(--muted); margin-right:6px;}
    .upd-day{font-weight:500; color:var(--ink);}
    .upd-year:before{content:"·  ";}
    .foot-grid{grid-template-columns:1fr; gap:22px;}
  }
</style>
<style>:root[data-theme="dark"]{--paper:#1A1410;--paper-tint:#251D17;--paper-deep:#33281F;--ink:#F5EFE4;--text:#DDD2BF;--muted:#9C8A72;--hint:#6F6051;--hair:rgba(245,239,228,0.10);--rule:rgba(245,239,228,0.20);--counter:#6F6051;--accent:#C9685A;--accent-soft:rgba(201,104,90,0.18);--treat:#7AB8C2;--treat-soft:rgba(122,184,194,0.20);}:root[data-theme="light"]{--paper:#F4F2EC;--paper-tint:#EBE8E0;--paper-deep:#DDD8CB;--ink:#2A1E15;--text:#403228;--muted:#6A553E;--hint:#A89A82;--hair:rgba(42,30,21,0.12);--rule:rgba(42,30,21,0.22);--counter:#A89A82;--accent:#6B1F2D;--accent-soft:rgba(107,31,45,0.14);--treat:#1F4F5A;--treat-soft:rgba(31,79,90,0.14);}.theme-toggle{background:none;border:0;border-bottom:1px solid transparent;cursor:pointer;font:inherit;color:var(--muted);padding:0 0 3px 0;display:inline-flex;align-items:baseline;gap:6px;transition:color .15s ease,border-color .15s ease;}.theme-toggle:hover{color:var(--ink);border-bottom-color:var(--accent);}.pub-as{margin-left:14px;font-size:11.5px;color:var(--hint);letter-spacing:0.04em;}.pub-as em{font-style:italic;color:var(--muted);}.theme-toggle .tt-icon{font-size:1.05em;line-height:1;display:inline-block;transition:transform .25s ease;position:relative;top:1px;}.theme-toggle:hover .tt-icon{transform:rotate(30deg);}.tt-when-dark{display:none;}.tt-when-light{display:inline;}:root[data-theme="dark"] .tt-when-light{display:none;}:root[data-theme="dark"] .tt-when-dark{display:inline;}@media (prefers-color-scheme: dark){:root:not([data-theme="light"]) .tt-when-light{display:none;}:root:not([data-theme="light"]) .tt-when-dark{display:inline;}}</style><script>(function(){var s=localStorage.getItem("theme");if(s==="dark"||s==="light")document.documentElement.setAttribute("data-theme",s);})();</script>
<style>
  /* CV page */
  /* CV dropdown over PDF fix: PDF iframe was capturing hover and closing the Work dropdown */
  body.cv-page header.site{position:relative; z-index:200;}
  body.cv-page .pdf-embed{position:relative; z-index:1;}
  body.cv-page:has(.nav-item:hover) .pdf-embed,
  body.cv-page:has(.nav-item:focus-within) .pdf-embed{pointer-events:none;}
  body.cv-page header.site{padding-bottom:18px; border-bottom:none;}
  .cv-hero{padding:14px 0 10px; border-bottom:none;}
  .cv-actions{margin:0; display:flex; flex-wrap:wrap; gap:8px 26px; align-items:baseline; font-family:var(--sans); font-size:13.5px;}
  .cv-actions .meta{color:var(--muted); letter-spacing:0.04em;}
  .cv-actions a.dl{color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accent); padding-bottom:2px; font-weight:500; letter-spacing:0.04em; transition:color .15s ease, border-color .15s ease;}
  .cv-actions a.dl:hover{color:var(--ink); border-bottom-color:var(--ink);}
  .cv-embed-wrap{margin:14px 0 0;}
  .pdf-embed{display:block; width:100%; height:min(1500px, calc(100vh - 60px)); min-height:780px; border:1px solid var(--hair); background:var(--paper-tint);}
  .pdf-fallback{font-family:var(--sans); font-size:14px; color:var(--muted); padding:24px;}
  .pdf-fallback a{color:var(--accent); border-bottom:1px solid var(--accent); text-decoration:none; padding-bottom:1px;}
  @media (max-width:640px){
    .cv-hero{padding:10px 0 8px;}
    .pdf-embed{height:80vh; min-height:520px;}
  }
</style>
<style>
  /* WORK DROPDOWN */
  .nav-item{position:relative;}
  .nav-item .caret{display:inline-block; font-size:0.7em; margin-left:3px; position:relative; top:-1px; opacity:0.7; transition:transform .18s ease;}
  .nav-item:hover .caret, .nav-item:focus-within .caret{transform:rotate(180deg);}
  .nav-item:hover .nav-trigger, .nav-item:focus-within .nav-trigger{color:var(--ink); border-bottom-color:var(--accent);}
  .nav-dropdown{
    position:absolute; top:100%; left:-14px;
    min-width:248px; padding:8px 0;
    background:var(--paper); border:1px solid var(--hair);
    box-shadow:0 12px 32px rgba(0,0,0,0.18);
    opacity:0; visibility:hidden; transform:translateY(-4px);
    transition:opacity .18s ease, transform .18s ease, visibility .18s; transition-delay:.12s;
    z-index:100;
  }
  .nav-item:hover .nav-dropdown, .nav-item:focus-within .nav-dropdown{
    opacity:1; visibility:visible; transform:translateY(0); transition-delay:0s;
  }
  .nav-dropdown .dd-item{
    display:block; padding:11px 18px;
    text-decoration:none; color:var(--text);
    font-family:var(--sans); border:none;
    transition:background .12s ease, color .12s ease;
  }
  .nav-dropdown a.dd-item:hover, .nav-dropdown a.dd-item:focus{
    background:var(--paper-tint); color:var(--accent); outline:none; border:none;
  }
  .nav-dropdown .dd-item.disabled{color:var(--hint); cursor:default;}
  .nav-dropdown .dd-item.disabled:hover{background:transparent; color:var(--hint);}
  .dd-title{display:block; font-size:14px; font-weight:500;}
  .dd-note{display:block; font-size:11.5px; color:var(--muted); margin-top:2px; font-style:italic;}
  .dd-item.disabled .dd-note{color:var(--hint);}
  @media (max-width:640px){.nav-dropdown, .nav-item .caret{display:none;}}
</style>
</head>
<body class="cv-page">

<div class="wrap">

  <!-- HEADER -->
  <header class="site reveal d1">
    <div class="head-grid">
      <div class="name-block">
        <h1 class="name"><a href="preview.html">Sebastian Olascoaga</a></h1>
        <p class="role"><strong>City of Boston</strong> <span class="dot">·</span> <strong>MIT</strong></p>
      </div>
      <nav class="nav">
        <a href="preview.html">Home</a>
        <div class="nav-item">
          <a href="preview-papers.html" class="nav-trigger">Work <span class="caret" aria-hidden="true">&#x25BE;</span></a>
          <div class="nav-dropdown" role="menu">
            <a href="preview-papers.html" role="menuitem" class="dd-item">
              <span class="dd-title">Published Work</span>
              <span class="dd-note">Papers, working papers, and theses</span>
            </a>
            <span class="dd-item disabled" role="menuitem" aria-disabled="true">
              <span class="dd-title">Short Pieces</span>
              <span class="dd-note">Coming soon</span>
            </span>
            <span class="dd-item disabled" role="menuitem" aria-disabled="true">
              <span class="dd-title">Teaching</span>
              <span class="dd-note">Coming soon</span>
            </span>
          </div>
        </div>
        <a href="preview-cv.html" class="here">CV</a>
        <a href="https://scholar.google.com/citations?user=gTzz3UAAAAAJ&hl=en" target="_blank" rel="noopener noreferrer">Scholar</a>
        <a href="preview.html#contact">Contact</a>
        <button class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle light/dark"><span class="tt-icon">◐</span><span class="tt-label"><span class="tt-when-light">Dark mode</span><span class="tt-when-dark">Light mode</span></span></button>
      </nav>
    </div>
  </header>

  <!-- CV ACTIONS -->
  <section class="cv-hero reveal d2">
    <p class="cv-actions">
      <span class="meta">Updated May 2026</span>
      <a class="dl" href="files/cv.pdf" download>Download PDF ↓</a>
      <a class="dl" href="files/cv.pdf" target="_blank" rel="noopener noreferrer">Open in new tab ↗</a>
    </p>
  </section>

  <!-- EMBEDDED PDF -->
  <div class="cv-embed-wrap reveal d3">
    <object class="pdf-embed" data="files/cv.pdf#view=FitH&amp;pagemode=none&amp;navpanes=0&amp;toolbar=1" type="application/pdf" aria-label="Sebastian Olascoaga CV (PDF)">
      <div class="pdf-fallback">Your browser can't display the embedded PDF. <a href="files/cv.pdf">Download the CV as a PDF.</a></div>
    </object>
  </div>

  <footer>
    <div class="foot-grid">
      <p class="copy">© 2026 Sebastian Olascoaga</p>
      <nav class="footlinks">
        <a href="preview.html">Home</a>
        <a href="preview-papers.html">Work</a>
        <a href="preview-cv.html">CV</a>
        <a href="https://www.linkedin.com/in/sebastianolascoaga/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="https://scholar.google.com/citations?user=gTzz3UAAAAAJ&hl=en" target="_blank" rel="noopener noreferrer">Scholar</a>
        <a href="preview.html#contact">Contact</a>
      </nav>
    </div>
  </footer>

</div>
<script>document.querySelectorAll(".theme-toggle").forEach(function(b){b.addEventListener("click",function(){var r=document.documentElement;var c=r.getAttribute("data-theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");var n=c==="dark"?"light":"dark";r.setAttribute("data-theme",n);localStorage.setItem("theme",n);});});</script>
</body>
