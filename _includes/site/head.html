<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
{%- assign page_title = page.page_title | default: site.title -%}
{%- assign page_desc = page.description | default: site.description -%}
{%- assign social_title = page.heading | default: site.title -%}
<title>{{ page_title }}</title>
<meta name="description" content="{{ page_desc | escape }}" />
<link rel="canonical" href="{{ page.url | absolute_url }}" />
<link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml" />
<meta property="og:type" content="{{ page.og_type | default: 'website' }}" />
<meta property="og:site_name" content="{{ site.title }}" />
<meta property="og:title" content="{{ social_title | escape }}" />
<meta property="og:description" content="{{ page_desc | escape }}" />
<meta property="og:url" content="{{ page.url | absolute_url }}" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="{{ social_title | escape }}" />
<meta name="twitter:description" content="{{ page_desc | escape }}" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
{%- if page.template_css %}
<link rel="stylesheet" href="{{ '/assets/css/pages/' | append: page.template_css | append: '.css' | relative_url }}">
{%- endif %}
{%- if page.page_css %}
<link rel="stylesheet" href="{{ '/assets/css/pages/' | append: page.page_css | append: '.css' | relative_url }}">
{%- endif %}
<script>(function(){var s=localStorage.getItem("theme");if(s==="dark"||s==="light")document.documentElement.setAttribute("data-theme",s);})();</script>
