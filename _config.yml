# Sebastian Olascoaga — personal site
title: "Sebastian Olascoaga"
description: "Field experiments and evaluations on public questions."
url: "https://sebastian-olascoaga.com"
baseurl: ""
lang: en

permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  smart_quotes: lsquo,rsquo,ldquo,rdquo

plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - package.json
  - README.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - LICENSE
  - markdown_generator
  - talkmap.py
  - talkmap.ipynb
  - talkmap
  - "*.code-workspace"

keep_files:
  - .git
